name: Laravel Horizon Doctor
description: Run php artisan horizon:doctor in CI to validate Horizon and queue configuration.
author: Oliver Kaufmann

branding:
  icon: check-circle
  color: green

inputs:
  working-directory:
    description: >
      Path to your Laravel application root (where composer.json and artisan live),
      relative to the repository root.
    required: false
    default: .
  skip-prerequisites:
    description: >
      When true, skip PHP, Composer, and package presence checks. Use only for debugging;
      the action will still fail if horizon:doctor exits non-zero.
    required: false
    default: "false"
  minimum-php-version:
    description: >
      Minimum PHP version as major.minor (e.g. 8.4). Should match the constraint of the
      okaufmann/laravel-horizon-doctor version you use.
    required: false
    default: "8.4"
  strict-warnings:
    description: >
      When true, run `php artisan horizon:doctor --strict-warnings` so documentation and
      consistency warnings fail the step (default: only hard errors fail).
    required: false
    default: "false"
  no-overview:
    description: >
      When true, pass `--no-overview` to hide the Redis queue vs Horizon mapping table (smaller logs).
    required: false
    default: "false"
  verbose:
    description: >
      When true, passes `-v` to `horizon:doctor` for full output (overview table, passing checks, long hints).
      Default is off for smaller CI logs.
    required: false
    default: "false"
  scan-queued-classes:
    description: >
      When `true`, passes `--scan-jobs`. When `false`, passes `--no-scan-jobs` (disables scanning even if enabled in config).
      When empty (default), uses `scan_queued_classes` from your published `config/horizon-doctor.php` / package defaults.
    required: false
    default: ""
  strict-job-timeouts:
    description: >
      When `true`, passes `--strict-job-timeouts` (scan must be on). When `false`, passes `--no-strict-job-timeouts`.
      When empty (default), uses `strict_job_timeouts` from config. Only affects the queued-class scan.
    required: false
    default: ""

outputs:
  result:
    description: success when all doctor checks passed, failure otherwise
    value: ${{ steps.horizon-doctor.outputs.result }}

runs:
  using: composite
  steps:
    - name: Verify prerequisites
      if: inputs.skip-prerequisites != 'true'
      shell: bash
      env:
        TARGET_DIR: ${{ github.workspace }}/${{ inputs.working-directory }}
        MINIMUM_PHP_VERSION: ${{ inputs.minimum-php-version }}
      run: bash --noprofile --norc "${{ github.action_path }}/scripts/verify-prerequisites.sh"

    - name: Run Horizon Doctor
      id: horizon-doctor
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STRICT_WARNINGS: ${{ inputs.strict-warnings }}
        NO_OVERVIEW: ${{ inputs.no-overview }}
        VERBOSE: ${{ inputs.verbose }}
      run: |
        set +e
        FLAGS=(--no-interaction)
        if [[ "${VERBOSE}" == "true" ]]; then
          FLAGS+=(-v)
        fi
        if [[ "${STRICT_WARNINGS}" == "true" ]]; then
          FLAGS+=(--strict-warnings)
        fi
        if [[ "${NO_OVERVIEW}" == "true" ]]; then
          FLAGS+=(--no-overview)
        fi
        SCAN="${{ inputs.scan-queued-classes }}"
        if [[ "$SCAN" == "true" ]]; then
          FLAGS+=(--scan-jobs)
        elif [[ "$SCAN" == "false" ]]; then
          FLAGS+=(--no-scan-jobs)
        fi
        SJ="${{ inputs.strict-job-timeouts }}"
        if [[ "$SJ" == "true" ]]; then
          FLAGS+=(--strict-job-timeouts)
        elif [[ "$SJ" == "false" ]]; then
          FLAGS+=(--no-strict-job-timeouts)
        fi
        php artisan horizon:doctor "${FLAGS[@]}"
        code=$?
        if [[ "$code" -eq 0 ]]; then
          echo "result=success" >> "$GITHUB_OUTPUT"
        else
          echo "result=failure" >> "$GITHUB_OUTPUT"
        fi
        exit "$code"
